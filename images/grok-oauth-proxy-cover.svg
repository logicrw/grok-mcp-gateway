<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Grok OAuth Proxy cover</title>
  <desc id="desc">A local gateway connecting multi-agent clients to Grok models and xAI X Search through Hermes OAuth.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.48" stop-color="#101827"/>
      <stop offset="1" stop-color="#0f1f1b"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#101821"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#68e0cf"/>
      <stop offset="0.45" stop-color="#7aa8ff"/>
      <stop offset="1" stop-color="#f6c76f"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <circle cx="1280" cy="120" r="220" fill="#68e0cf" opacity="0.07"/>
  <circle cx="190" cy="760" r="280" fill="#7aa8ff" opacity="0.07"/>

  <g transform="translate(120 92)">
    <rect x="0" y="0" width="1360" height="716" rx="34" fill="#0d1420" opacity="0.82" stroke="#26364a" filter="url(#softShadow)"/>
    <rect x="1" y="1" width="1358" height="714" rx="33" fill="none" stroke="url(#accent)" opacity="0.34"/>

    <text x="68" y="92" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="56" font-weight="760" letter-spacing="0">
      Grok OAuth Proxy
    </text>
    <text x="70" y="137" fill="#aebbd0" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="22">
      Local Grok gateway + resident HTTP MCP X Search for multi-agent clients
    </text>

    <g transform="translate(70 210)">
      <text x="0" y="0" fill="#d8e4f7" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="700">Clients</text>
      <g transform="translate(0 34)">
        <rect width="260" height="70" rx="18" fill="url(#panel)" stroke="#2a3a52"/>
        <text x="28" y="44" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="680">Alma</text>
      </g>
      <g transform="translate(0 122)">
        <rect width="260" height="70" rx="18" fill="url(#panel)" stroke="#2a3a52"/>
        <text x="28" y="44" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="680">Claude Code</text>
      </g>
      <g transform="translate(0 210)">
        <rect width="260" height="70" rx="18" fill="url(#panel)" stroke="#2a3a52"/>
        <text x="28" y="44" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="680">Codex</text>
      </g>
      <g transform="translate(0 298)">
        <rect width="260" height="70" rx="18" fill="url(#panel)" stroke="#2a3a52"/>
        <text x="28" y="44" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="680">Gemini CLI</text>
      </g>
    </g>

    <g transform="translate(512 246)">
      <rect width="348" height="282" rx="28" fill="#111c2c" stroke="#3a4d68" filter="url(#softShadow)"/>
      <rect x="22" y="22" width="304" height="238" rx="22" fill="#0e1724" stroke="url(#accent)" opacity="0.85"/>
      <text x="54" y="88" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui" font-size="32" font-weight="780">Resident Proxy</text>
      <text x="54" y="130" fill="#9fb2c9" font-family="Inter, ui-sans-serif, system-ui" font-size="20">http://127.0.0.1:9996</text>
      <line x1="54" y1="164" x2="294" y2="164" stroke="#2d425e"/>
      <text x="54" y="206" fill="#68e0cf" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">/v1/*</text>
      <text x="146" y="206" fill="#d5e2f4" font-family="Inter, ui-sans-serif, system-ui" font-size="20">Grok API</text>
      <text x="54" y="238" fill="#f6c76f" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">/mcp</text>
      <text x="146" y="238" fill="#d5e2f4" font-family="Inter, ui-sans-serif, system-ui" font-size="20">X Search tool</text>
    </g>

    <g transform="translate(1030 210)">
      <text x="0" y="0" fill="#d8e4f7" font-family="Inter, ui-sans-serif, system-ui" font-size="24" font-weight="700">xAI</text>
      <g transform="translate(0 34)">
        <rect width="260" height="110" rx="20" fill="url(#panel)" stroke="#2a3a52"/>
        <text x="28" y="48" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui" font-size="27" font-weight="720">Grok Models</text>
        <text x="28" y="82" fill="#98aabd" font-family="Inter, ui-sans-serif, system-ui" font-size="17">OpenAI-compatible calls</text>
      </g>
      <g transform="translate(0 178)">
        <rect width="260" height="110" rx="20" fill="url(#panel)" stroke="#2a3a52"/>
        <text x="28" y="48" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui" font-size="27" font-weight="720">X Search</text>
        <text x="28" y="82" fill="#98aabd" font-family="Inter, ui-sans-serif, system-ui" font-size="17">MCP tool for agents</text>
      </g>
      <g transform="translate(0 322)">
        <rect width="260" height="86" rx="20" fill="#111c2c" stroke="#2a3a52"/>
        <text x="28" y="38" fill="#eef6ff" font-family="Inter, ui-sans-serif, system-ui" font-size="22" font-weight="700">Hermes OAuth</text>
        <text x="28" y="64" fill="#98aabd" font-family="Inter, ui-sans-serif, system-ui" font-size="16">No separate xAI API key</text>
      </g>
    </g>

    <g fill="none" stroke-linecap="round" stroke-width="4">
      <path d="M 350 374 C 430 374, 450 374, 506 374" stroke="#68e0cf" opacity="0.95"/>
      <path d="M 350 462 C 430 462, 450 462, 506 462" stroke="#7aa8ff" opacity="0.9"/>
      <path d="M 860 348 C 930 348, 952 300, 1020 300" stroke="#68e0cf" opacity="0.95"/>
      <path d="M 860 444 C 930 444, 952 444, 1020 444" stroke="#f6c76f" opacity="0.95"/>
      <path d="M 684 528 C 740 620, 958 614, 1030 576" stroke="#7aa8ff" opacity="0.65"/>
    </g>

    <g transform="translate(70 622)">
      <rect width="1220" height="54" rx="18" fill="#111c2c" stroke="#29384e"/>
      <text x="28" y="35" fill="#cdd8e8" font-family="Inter, ui-sans-serif, system-ui" font-size="20">
        One local process gives agents model access, explicit X Search tools, token isolation, metrics, and headless deployment helpers.
      </text>
    </g>
  </g>
</svg>
